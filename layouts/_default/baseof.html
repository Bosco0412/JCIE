<!doctype html>
<html lang="{{ .Lang }}">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body>
    <div class="site-atmosphere" aria-hidden="true">
      <div class="atmo-blob atmo-blob--a"></div>
      <div class="atmo-blob atmo-blob--b"></div>
      <div class="atmo-blob atmo-blob--c"></div>
      <div class="atmo-vignette"></div>
    </div>

    {{ partial "header.html" . }}

    <main class="page">
      <div class="container">
        {{ block "main" . }}{{ end }}
      </div>
    </main>

    {{ partial "footer.html" . }}
  </body>
</html>
